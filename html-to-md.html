<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML to Markdown Converter</title>

    <script defer src="https://unpkg.com/defuddle@latest/dist/index.full.js"></script>
    <script defer src="https://unpkg.com/turndown/dist/turndown.js"></script>

    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/markdown.min.js"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css" media="(prefers-color-scheme: light)">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" media="(prefers-color-scheme: dark)">

    <style>
        :root {
            /* Light mode variables */
            --background-color: #fffcf1;
            --text-color: #000000;
            --border-color: #ddd;
            --button-color: #000000;
            --button-text: #fffcf1;
            --textarea-bg: #f5f2e6;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                /* Dark mode variables */
                --background-color: #181a1b;
                --text-color: #fffcf1;
                --border-color: #3a3e40;
                --button-color: #000000;
                --button-text: #fffcf1;
                --textarea-bg: #2b2a32;
            }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: var(--background-color);
            color: var(--text-color);
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        header {
            margin-bottom: 2rem;
            flex-shrink: 0;
        }

        .main-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            flex: 1;
            min-height: 0;
        }

        .column {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            min-height: 0;
        }

        textarea {
            flex: 1;
            padding: 1rem;
            border: 1px solid var(--border-color);
            border-radius: 0.375rem;
            font-family: monospace;
            font-size: 0.875rem;
            resize: none;
            min-height: 0;
            background-color: var(--textarea-bg);
            color: var(--text-color);
        }

        button {
            padding: 0.5rem 1rem;
            background-color: var(--button-color);
            color: var(--button-text);
            border: none;
            border-radius: 0.375rem;
            cursor: pointer;
            font-size: 0.875rem;
            transition: opacity 0.2s ease;
        }

        button:hover {
            opacity: 0.7;
        }

        button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .url-input {
            width: 100%;
            padding: 0.5rem;
            border: 1px solid var(--border-color);
            border-radius: 0.375rem;
            font-family: monospace;
            background-color: var(--textarea-bg);
            color: var(--text-color);
        }

        .markdown-wrapper {
            flex: 1;
            min-height: 0;
            border: 1px solid var(--border-color);
            border-radius: 0.375rem;
            background-color: var(--textarea-bg);
        }

        .markdown-wrapper pre {
            height: 100%;
            overflow: auto;
        }

        .button-row {
            display: flex;
            gap: 0.5rem;
        }

        .button-row button {
            flex: 1;
        }

        .markdown-wrapper code {
            white-space: pre-wrap;
            background: transparent !important;
            padding: 1rem;
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>HTML to Markdown Converter</h1>
            <p id="description">
                A simple tool to convert HTML to Markdown - either paste HTML directly or fetch from a URL.
            </p>
        </header>

        <div class="main-container">
            <div class="column">
                <h3>Input</h3>
                <input type="url" id="urlInput" placeholder="Enter URL" class="url-input">
                <div class="button-row">
                    <button onclick="fetchHTML()">Fetch</button>
                    <button onclick="fetchMarkdown()">Fetch Markdown</button>
                </div>
                <textarea id="htmlInput" placeholder="or paste your HTML here"></textarea>
                <div class="button-row">
                    <button onclick="convertToMarkdown(true)" title="Extract main content with Defuddle, then convert to Markdown">Convert with Defuddle</button>
                    <button onclick="convertToMarkdown(false)" title="Convert HTML to Markdown directly without content extraction">Convert with Turndown</button>
                </div>
            </div>

            <div class="column">
                <h3>Output</h3>
                <div class="markdown-wrapper">
                    <pre><code class="language-markdown" id="markdownOutput"></code></pre>
                </div>
                <button onclick="copyToClipboard(this)">Copy to Clipboard</button>
            </div>
        </div>
    </div>

    <script>
        async function copyToClipboard(button) {
            const markdown = document.getElementById('markdownOutput').textContent;
            await navigator.clipboard.writeText(markdown);

            const originalText = button.textContent;
            button.textContent = 'Copied!';
            button.disabled = true;

            setTimeout(() => {
                button.textContent = originalText;
                button.disabled = false;
            }, 1500);
        }

        async function fetchMarkdown() {
            const button = document.querySelector('button[onclick="fetchMarkdown()"]');
            button.disabled = true;
            button.textContent = 'Fetching...';

            const url = document.getElementById('urlInput').value;
            try {
                const signal = AbortSignal.timeout(15000);
                const response = await fetch('https://r.jina.ai/' + url, { signal });
                const markdown = await response.text();

                const markdownOutput = document.getElementById('markdownOutput');
                const highlighted = hljs.highlight(markdown, { language: 'markdown' }).value;
                markdownOutput.innerHTML = highlighted;
            } catch (e) {
                alert('Fetch failed: ' + e.message);
            }

            button.disabled = false;
            button.textContent = 'Fetch Markdown';
        }

        async function fetchHTML() {
            const button = document.querySelector('button[onclick="fetchHTML()"]');
            button.disabled = true;
            button.textContent = 'Fetching...';

            const url = document.getElementById('urlInput').value;
            try {
                const signal = AbortSignal.timeout(10000);
                const response = await fetch('https://api.allorigins.win/raw?url=' + encodeURIComponent(url), { signal });
                const html = await response.text();
                document.getElementById('htmlInput').value = html;
            } catch (e) {
                alert('Fetch failed: ' + e.message);
            }

            button.disabled = false;
            button.textContent = 'Fetch';
        }

        function convertToMarkdown(useDefuddle) {
            const buttons = document.querySelectorAll('.button-row button');
            buttons.forEach(b => b.disabled = true);

            const htmlInput = document.getElementById('htmlInput').value;
            const parser = new DOMParser();
            const doc = parser.parseFromString(htmlInput, 'text/html');

            let markdown;
            if (useDefuddle) {
                const defuddle = new Defuddle(doc, { markdown: true, standardize: false });
                const result = defuddle.parse();

                const url = document.getElementById('urlInput').value;
                const frontmatterFields = [
                    result.title       && `title: "${result.title}"`,
                    url                && `source: "${url}"`,
                    result.language    && `language: "${result.language}"`,
                    result.description && `description: "${result.description}"`,
                    result.wordCount   && `word_count: ${result.wordCount}`,
                ].filter(Boolean);

                const frontmatter = frontmatterFields.length
                    ? `---\n${frontmatterFields.join('\n')}\n---\n\n`
                    : '';
                const title = result.title ? `# ${result.title}\n\n` : '';

                markdown = frontmatter + title + result.content;
            } else {
                const turndownService = new TurndownService({ headingStyle: 'atx' });
                markdown = turndownService.turndown(doc.body.innerHTML);
            }

            const markdownOutput = document.getElementById('markdownOutput');
            const highlighted = hljs.highlight(markdown, { language: 'markdown' }).value;
            markdownOutput.innerHTML = highlighted;

            buttons.forEach(b => b.disabled = false);
        }
    </script>
</body>
</html>
